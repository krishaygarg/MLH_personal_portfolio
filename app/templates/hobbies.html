<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <meta name="description" content="Krishay Garg's Hobbies - Quiz Bowl, Board Games, and other interests.">
    <meta property="og:title" content="Krishay Garg | Hobbies">
    <meta property="og:description" content="Read about Krishay Garg's hobbies and interests outside of computer science.">
    <meta property="og:url" content="{{ url }}/hobbies">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="./static/styles/main.css">
    <link rel="icon" href="./static/img/favicon.ico" type="image/x-icon" />
    <title>{{ title }}</title>
</head>
<body>

    <!-- Dynamic Menu Bar -->
    <header class="nav-bar">
        <div class="nav-content">
            <a href="/" class="nav-logo-link" id="logo-home">
                <div class="nav-logo">
                    <img src="./static/img/logo.svg" alt="MLH Logo" />
                    <span>Portfolio</span>
                </div>
            </a>
            <nav class="nav-links">
                <a href="/" class="nav-link {% if active_page == 'home' %}active{% endif %}" id="nav-home">Home</a>
                <a href="/hobbies" class="nav-link {% if active_page == 'hobbies' %}active{% endif %}" id="nav-hobbies">Hobbies</a>
                <a href="/timeline" class="nav-link {% if active_page == 'timeline' %}active{% endif %}" id="nav-timeline">Timeline</a>
            </nav>
        </div>
    </header>

    <main class="container">
        <!-- Hobbies Section -->
        <section class="section-card" id="hobbies-list">
            <h1 class="section-title">My Hobbies</h1>
            <p class="section-subtitle">Outside of coding and machine learning, here are a few things I'm passionate about:</p>
            
            <div class="hobbies-grid">
                {% for hobby in hobbies %}
                <div class="hobby-card card-interactive" id="hobby-{{ loop.index }}">
                    <div class="hobby-image-container">
                        <img src="{{ hobby.image }}" alt="{{ hobby.name }} photo">
                    </div>
                    <div class="hobby-details">
                        <h2 class="hobby-title">{{ hobby.name }}</h2>
                        <p class="hobby-description">{{ hobby.description }}</p>
                    </div>
                </div>
                {% endfor %}
            </div>
            
            <div class="back-home-container">
                <a href="/" class="btn-primary" id="btn-back-home">Back to Home</a>
            </div>
        </section>
    </main>

    <footer class="footer">
        <p>&copy; 2026 Krishay Garg. Built with Flask and Jinja.</p>
    </footer>

</body>
</html>
